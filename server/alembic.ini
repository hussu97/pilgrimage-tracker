[alembic]
# Path to migration scripts, relative to this file
script_location = migrations

# Default DB URL — overridden at runtime from DATABASE_URL env var in env.py
sqlalchemy.url = sqlite:///pilgrimage.db

# Generate files like 0001_initial.py (rev_id_length controls the numeric prefix width)
file_template = %%(rev)s_%%(slug)s

prepend_sys_path = .

[post_write_hooks]
# No post-write hooks by default

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
