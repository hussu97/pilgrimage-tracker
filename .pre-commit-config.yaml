repos:
  # ─── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ".*\\.md$"
      - id: end-of-file-fixer
        exclude: ".*\\.(json|svg)$"
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ".*\\.github/.*"
      - id: check-json
        exclude: "(seed_data\\.json|package-lock\\.json)"
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ".*\\.(bat|ps1)$"

  # ─── Python: Ruff (lint + format) ────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(soulstep-catalog-api|soulstep-scraper-api)/
      - id: ruff-format
        files: ^(soulstep-catalog-api|soulstep-scraper-api)/

  # ─── JavaScript / TypeScript: ESLint ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint-web
        name: ESLint (web)
        language: node
        entry: bash -c 'cd apps/soulstep-customer-web && npx eslint --fix --ext ts,tsx src/'
        files: ^apps/soulstep-customer-web/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: eslint-mobile
        name: ESLint (mobile)
        language: node
        entry: bash -c 'cd apps/soulstep-customer-mobile && npx eslint --fix --ext ts,tsx src/'
        files: ^apps/soulstep-customer-mobile/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ─── JavaScript / TypeScript / JSON / YAML: Prettier ─────────────────────────
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        language: node
        entry: bash -c 'cd apps/soulstep-customer-web && npx prettier --write "src/**/*.{ts,tsx,css}"'
        files: ^apps/soulstep-customer-web/src/.*\.(ts|tsx|css)$
        pass_filenames: false

      - id: prettier-mobile
        name: Prettier (mobile)
        language: node
        entry: bash -c 'cd apps/soulstep-customer-mobile && npx prettier --write "src/**/*.{ts,tsx}"'
        files: ^apps/soulstep-customer-mobile/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ─── Pre-push: production build checks ───────────────────────────────────────
  - repo: local
    hooks:
      - id: nextjs-build
        name: Next.js build (web)
        language: system
        entry: bash -c 'cd apps/soulstep-customer-web && npm run build'
        files: ^apps/soulstep-customer-web/
        pass_filenames: false
        stages: [pre-push]

      - id: vite-build-admin
        name: Vite build (admin)
        language: system
        entry: bash -c 'cd apps/soulstep-admin-web && npm run build'
        files: ^apps/soulstep-admin-web/
        pass_filenames: false
        stages: [pre-push]

      # Pytest runs include --cov --cov-fail-under to mirror the coverage
      # gates used on main branch in .github/workflows/tests.yml — catches
      # coverage regressions locally instead of only after push reaches CI.
      - id: pytest-catalog-api
        name: pytest (catalog-api) + coverage >=80%
        language: system
        entry: bash -c 'cd soulstep-catalog-api && source .venv/bin/activate && python -m pytest tests/ -x -q --tb=short --cov=app --cov-report=term-missing:skip-covered --cov-fail-under=80'
        files: ^soulstep-catalog-api/
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-scraper-api
        name: pytest (scraper-api) + coverage >=75%
        language: system
        entry: bash -c 'cd soulstep-scraper-api && source .venv/bin/activate && python -m pytest tests/ -x -q --tb=short --cov=app --cov-report=term-missing:skip-covered --cov-fail-under=75'
        files: ^soulstep-scraper-api/
        pass_filenames: false
        stages: [pre-push]

      # JS/TS test runs use the :coverage script so vitest/jest enforce the
      # thresholds declared in each project's vitest.config.ts / jest.config.js
      # (all three apps = 80%). Mirrors tests.yml CI behavior.
      - id: vitest-web
        name: Vitest (web) + coverage threshold
        language: system
        entry: bash -c 'cd apps/soulstep-customer-web && npm run test:coverage'
        files: ^apps/soulstep-customer-web/
        pass_filenames: false
        stages: [pre-push]

      - id: vitest-admin
        name: Vitest (admin) + coverage threshold
        language: system
        entry: bash -c 'cd apps/soulstep-admin-web && npm run test:coverage'
        files: ^apps/soulstep-admin-web/
        pass_filenames: false
        stages: [pre-push]

      - id: jest-mobile
        name: Jest (mobile) + coverage threshold
        language: system
        entry: bash -c 'cd apps/soulstep-customer-mobile && npm run test:coverage'
        files: ^apps/soulstep-customer-mobile/
        pass_filenames: false
        stages: [pre-push]

      - id: tsc-mobile
        name: TypeScript typecheck (mobile)
        language: system
        entry: bash -c 'cd apps/soulstep-customer-mobile && npx tsc --noEmit'
        files: ^apps/soulstep-customer-mobile/
        pass_filenames: false
        stages: [pre-push]
