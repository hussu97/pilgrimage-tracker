# Pre-TLS config — used before Let's Encrypt certs are issued (USE_SSL=false).
# Both subdomains are served here so certbot ACME challenges work on each.

server {
    listen 80;
    server_name catalog-api.soul-step.org;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://catalog_backend;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name scraper-api.soul-step.org;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://scraper_backend;
        proxy_read_timeout 3600s;
    }
}
