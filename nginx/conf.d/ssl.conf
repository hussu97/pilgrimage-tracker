# TLS config — used after Let's Encrypt certs are issued (USE_SSL=true).
# Both subdomains share one SAN cert at /etc/letsencrypt/live/soul-step.org/.

# HTTP → HTTPS redirect for both subdomains
server {
    listen 80;
    server_name catalog-api.soul-step.org scraper-api.soul-step.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# catalog-api.soul-step.org → catalog-api
server {
    listen 443 ssl http2;
    server_name catalog-api.soul-step.org;

    ssl_certificate     /etc/letsencrypt/live/soul-step.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soul-step.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparams /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    client_max_body_size 20M;

    limit_req zone=api_limit burst=40 nodelay;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://catalog_backend;
        proxy_read_timeout 120s;
    }
}

# scraper-api.soul-step.org → scraper-api
server {
    listen 443 ssl http2;
    server_name scraper-api.soul-step.org;

    ssl_certificate     /etc/letsencrypt/live/soul-step.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soul-step.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparams /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    client_max_body_size 20M;

    # Lower rate limit for scraper endpoints — they're admin-only
    limit_req zone=api_limit burst=20 nodelay;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://scraper_backend;
        # Long timeout: scraper jobs can run for hours
        proxy_read_timeout 3600s;
    }
}
