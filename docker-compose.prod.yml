services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Tuned for e2-small (2 GB RAM). Leaves ~1.2 GB for the two APIs + nginx + OS.
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=400MB
      -c max_connections=100
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c synchronous_commit=off
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soulstep_net

  catalog-api:
    image: ghcr.io/hussu97/soulstep-catalog-api:latest
    pull_policy: always
    restart: always
    environment:
      # ── Constructed / internal ────────────────────────────────────────────
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SCRAPER_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${SCRAPER_POSTGRES_DB}
      CATALOG_SYNC_LOG_DIR: ${CATALOG_SYNC_LOG_DIR:-/tmp/soulstep-catalog-sync}
      PORT: "3000"
      DATA_SCRAPER_URL: http://scraper-api:8080
      LOG_FORMAT: json
      # ── Auth / tokens ─────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-30m}
      REFRESH_EXPIRE: ${REFRESH_EXPIRE:-30d}
      ENFORCE_HTTPS: ${ENFORCE_HTTPS:-false}
      # ── Integrations ──────────────────────────────────────────────────────
      CATALOG_API_KEY: ${CATALOG_API_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@soul-step.org}
      # ── URLs / CORS ───────────────────────────────────────────────────────
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL:-https://soul-step.org}
      RESET_URL_BASE: ${RESET_URL_BASE:-https://soul-step.org}
      VERIFY_URL_BASE: ${VERIFY_URL_BASE:-}
      # ── App versioning / store links ──────────────────────────────────────
      MIN_APP_VERSION_SOFT: ${MIN_APP_VERSION_SOFT:-}
      MIN_APP_VERSION_HARD: ${MIN_APP_VERSION_HARD:-}
      LATEST_APP_VERSION: ${LATEST_APP_VERSION:-}
      APP_STORE_URL_IOS: ${APP_STORE_URL_IOS:-}
      APP_STORE_URL_ANDROID: ${APP_STORE_URL_ANDROID:-}
      # ── Ads ───────────────────────────────────────────────────────────────
      ADS_ENABLED: ${ADS_ENABLED:-false}
      ADSENSE_PUBLISHER_ID: ${ADSENSE_PUBLISHER_ID:-}
      ADMOB_APP_ID_IOS: ${ADMOB_APP_ID_IOS:-}
      ADMOB_APP_ID_ANDROID: ${ADMOB_APP_ID_ANDROID:-}
      # ── Image storage ─────────────────────────────────────────────────────
      IMAGE_STORAGE: ${IMAGE_STORAGE:-gcs}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      # ── Browser-translation pool (catalog-api internal scraper fallback) ──
      BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-10}
      BROWSER_MAX_TRANSLATIONS: ${BROWSER_MAX_TRANSLATIONS:-20}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
      # ── Observability ─────────────────────────────────────────────────────
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - soulstep_net

  scraper-api:
    image: ghcr.io/hussu97/soulstep-scraper-api:latest
    pull_policy: always
    restart: always
    environment:
      # ── Constructed / internal ────────────────────────────────────────────
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${SCRAPER_POSTGRES_DB}
      SCRAPER_CLOUD_RUN_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@10.132.0.2:5432/${SCRAPER_POSTGRES_DB}
      PORT: "8080"
      MAIN_SERVER_URL: http://catalog-api:3000
      # Public URL forwarded to Cloud Run jobs so they can reach the catalog API.
      # Cloud Run jobs cannot resolve the Docker-internal "catalog-api" hostname above.
      # Set this to http://<VM_EXTERNAL_IP>:3000 in your .env file on the VM.
      CLOUD_RUN_CATALOG_URL: ${CLOUD_RUN_CATALOG_URL:-}
      LOG_FORMAT: json
      SCRAPER_DISPATCH: cloud_run
      CLOUD_RUN_JOB_NAME: ${CLOUD_RUN_JOB_NAME:-soulstep-scraper-api-job}
      CLOUD_RUN_REGION: ${CLOUD_RUN_REGION:-europe-west1}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      # ── Integrations / API keys ───────────────────────────────────────────
      CATALOG_API_KEY: ${CATALOG_API_KEY}
      FOURSQUARE_API_KEY: ${SCRAPER_FOURSQUARE_API_KEY:-}
      GEMINI_API_KEY: ${SCRAPER_GEMINI_API_KEY:-}
      OUTSCRAPER_API_KEY: ${SCRAPER_OUTSCRAPER_API_KEY:-}
      BESTTIME_API_KEY: ${SCRAPER_BESTTIME_API_KEY:-}
      # ── Shared: GCP / observability ───────────────────────────────────────
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # ── Server config ─────────────────────────────────────────────────────
      SCRAPER_ALLOWED_ORIGINS: ${SCRAPER_ALLOWED_ORIGINS:-https://admin.soul-step.org}
      SCRAPER_TIMEZONE: ${SCRAPER_TIMEZONE:-Asia/Dubai}
      SCRAPER_DB_PATH: ${SCRAPER_DB_PATH:-scraper.db}
      # ── DB pool ───────────────────────────────────────────────────────────
      SCRAPER_POOL_SIZE: ${SCRAPER_POOL_SIZE:-10}
      SCRAPER_MAX_OVERFLOW: ${SCRAPER_MAX_OVERFLOW:-5}
      SCRAPER_POOL_TIMEOUT: ${SCRAPER_POOL_TIMEOUT:-30}
      # ── Concurrency / throughput ──────────────────────────────────────────
      SCRAPER_DISCOVERY_CONCURRENCY: ${SCRAPER_DISCOVERY_CONCURRENCY:-15}
      SCRAPER_DETAIL_CONCURRENCY: ${SCRAPER_DETAIL_CONCURRENCY:-8}
      SCRAPER_ENRICHMENT_CONCURRENCY: ${SCRAPER_ENRICHMENT_CONCURRENCY:-5}
      SCRAPER_OVERPASS_CONCURRENCY: ${SCRAPER_OVERPASS_CONCURRENCY:-2}
      SCRAPER_OVERPASS_JITTER_MAX: ${SCRAPER_OVERPASS_JITTER_MAX:-1.5}
      SCRAPER_IMAGE_CONCURRENCY: ${SCRAPER_IMAGE_CONCURRENCY:-40}
      # ── Per-place budgets ─────────────────────────────────────────────────
      SCRAPER_MAX_PHOTOS: ${SCRAPER_MAX_PHOTOS:-3}
      SCRAPER_MAX_REVIEWS: ${SCRAPER_MAX_REVIEWS:-5}
      SCRAPER_MAX_REVIEW_IMAGES: ${SCRAPER_MAX_REVIEW_IMAGES:-2}
      # ── Quality gates ─────────────────────────────────────────────────────
      SCRAPER_GATE_IMAGE_DOWNLOAD: ${SCRAPER_GATE_IMAGE_DOWNLOAD:-0.75}
      SCRAPER_GATE_ENRICHMENT: ${SCRAPER_GATE_ENRICHMENT:-0.75}
      SCRAPER_GATE_SYNC: ${SCRAPER_GATE_SYNC:-0.75}
      # ── Post-run automation ───────────────────────────────────────────────
      SCRAPER_AUTO_SYNC_AFTER_RUN: ${SCRAPER_AUTO_SYNC_AFTER_RUN:-false}
      SCRAPER_TRIGGER_SEO_AFTER_SYNC: ${SCRAPER_TRIGGER_SEO_AFTER_SYNC:-false}
      SCRAPER_DIRECT_CATALOG_SYNC: ${SCRAPER_DIRECT_CATALOG_SYNC:-true}
      # ── Cloud Run dispatch (regions list) ─────────────────────────────────
      CLOUD_RUN_REGIONS: ${CLOUD_RUN_REGIONS:-europe-west1:3,europe-west4:4,europe-west2:4}
      # ── Browser grid / Playwright pool ────────────────────────────────────
      BROWSER_GRID_CELL_SIZE_KM: ${BROWSER_GRID_CELL_SIZE_KM:-3.0}
      MAPS_BROWSER_POOL_SIZE: ${MAPS_BROWSER_POOL_SIZE:-}
      MAPS_BROWSER_MAX_PAGES: ${MAPS_BROWSER_MAX_PAGES:-30}
      MAPS_BROWSER_HEADLESS: ${MAPS_BROWSER_HEADLESS:-true}
      MAPS_BROWSER_CONCURRENCY: ${MAPS_BROWSER_CONCURRENCY:-}
      MAPS_BROWSER_CELL_DELAY_MIN: ${MAPS_BROWSER_CELL_DELAY_MIN:-1.0}
      MAPS_BROWSER_CELL_DELAY_MAX: ${MAPS_BROWSER_CELL_DELAY_MAX:-2.0}
      # Default: route Cloud Run Job browser traffic through the VM's tinyproxy
      # so Maps requests egress via the VM's clean IP (Cloud Run's shared egress
      # pool is on Google's Maps bot-wall). Override via GitHub secret if needed.
      BROWSER_PROXY_LIST: ${BROWSER_PROXY_LIST:-http://10.132.0.2:3128}
      BROWSER_PROXY_ROTATION: ${BROWSER_PROXY_ROTATION:-round_robin}
      BROWSER_SOCS_COOKIE: ${BROWSER_SOCS_COOKIE:-}
      MEMORY_LIMIT_MB: ${MEMORY_LIMIT_MB:-6144}
      # ── Wikipedia enrichment ──────────────────────────────────────────────
      WIKIPEDIA_MAX_DISTANCE_KM: ${WIKIPEDIA_MAX_DISTANCE_KM:-100.0}
    deploy:
      resources:
        limits:
          memory: 768m
    depends_on:
      postgres:
        condition: service_healthy
      catalog-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - soulstep_net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: always
    environment:
      USE_SSL: ${USE_SSL:-false}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      catalog-api:
        condition: service_healthy
      scraper-api:
        condition: service_healthy
    networks:
      - soulstep_net

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - soulstep_net

networks:
  soulstep_net:
    driver: bridge

volumes:
  postgres_data: {}
