name: Deploy VM - catalog-api + scraper-api

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-vm-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
  GHCR_REGISTRY: ghcr.io
  GHCR_OWNER: hussu97
  # GCP — still needed for the scraper Cloud Run Job
  REGION: europe-west1
  AR_REGISTRY: europe-west1-docker.pkg.dev
  AR_REPO: soulstep
  PROJECT_ID: project-fa2d7f52-2bc4-4a46-8ae
  SA_EMAIL: github-deploy@project-fa2d7f52-2bc4-4a46-8ae.iam.gserviceaccount.com
  WIF_PROVIDER: projects/834941457147/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  EXTRA_JOB_REGIONS: "europe-west4,europe-west2"

jobs:
  # ── Detect changed paths (same artifact as deploy.yml) ─────────────────────

  changes:
    name: Read path filter outputs from tests
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: read
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      scraper: ${{ steps.filter.outputs.scraper }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: path-filter-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Load filter outputs
        id: filter
        run: |
          echo "catalog=$(jq -r .catalog path-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "scraper=$(jq -r .scraper path-outputs.json)" >> "$GITHUB_OUTPUT"

  # ── Build images → GHCR ────────────────────────────────────────────────────

  build-catalog-api:
    name: Build soulstep-catalog-api → GHCR
    needs: [changes]
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: soulstep-catalog-api
          sparse-checkout-cone-mode: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push catalog-api
        uses: docker/build-push-action@v6
        with:
          context: ./soulstep-catalog-api
          file: soulstep-catalog-api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-catalog-api:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-catalog-api:${{ env.HEAD_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan catalog-api for vulnerabilities
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            "${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-catalog-api:${{ env.HEAD_SHA }}"

  build-scraper-api:
    name: Build soulstep-scraper-api (lean + job) → GHCR
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: soulstep-scraper-api
          sparse-checkout-cone-mode: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push scraper-api (lean — VM service)
        uses: docker/build-push-action@v6
        with:
          context: ./soulstep-scraper-api
          file: soulstep-scraper-api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-scraper-api:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-scraper-api:${{ env.HEAD_SHA }}
          cache-from: type=gha,scope=scraper-lean
          cache-to: type=gha,mode=max,scope=scraper-lean

      - name: Build and push scraper-api-job (Playwright — Cloud Run Job)
        uses: docker/build-push-action@v6
        with:
          context: ./soulstep-scraper-api
          file: soulstep-scraper-api/Dockerfile.job
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-scraper-api-job:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-scraper-api-job:${{ env.HEAD_SHA }}
          cache-from: type=gha,scope=scraper-job
          cache-to: type=gha,mode=max,scope=scraper-job

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan scraper-api (lean) for vulnerabilities
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            "${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-scraper-api:${{ env.HEAD_SHA }}"

  # ── Deploy: VM (catalog-api + scraper-api containers) ─────────────────────

  deploy-vm:
    name: Deploy to VM via SSH
    needs: [changes, build-catalog-api, build-scraper-api]
    # Run if at least one service changed — skipped jobs are treated as success
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.changes.outputs.catalog == 'true' || needs.changes.outputs.scraper == 'true') &&
      (needs.build-catalog-api.result == 'success' || needs.build-catalog-api.result == 'skipped') &&
      (needs.build-scraper-api.result == 'success' || needs.build-scraper-api.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write .env on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "grep -v '=$' > /opt/soulstep/.env" <<'ENVEOF'
          # ── Nginx / TLS ────────────────────────────────────────────────────────
          USE_SSL=${{ secrets.USE_SSL }}
          # ── Postgres ───────────────────────────────────────────────────────────
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          SCRAPER_POSTGRES_DB=${{ secrets.SCRAPER_POSTGRES_DB }}
          # ── Catalog-api: auth / tokens ─────────────────────────────────────────
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRE=${{ secrets.JWT_EXPIRE }}
          REFRESH_EXPIRE=${{ secrets.REFRESH_EXPIRE }}
          ENFORCE_HTTPS=${{ secrets.ENFORCE_HTTPS }}
          # ── Catalog-api: internal keys & integrations ─────────────────────────
          CATALOG_API_KEY=${{ secrets.CATALOG_API_KEY }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          # ── Catalog-api: URLs / CORS ──────────────────────────────────────────
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          RESET_URL_BASE=${{ secrets.RESET_URL_BASE }}
          VERIFY_URL_BASE=${{ secrets.VERIFY_URL_BASE }}
          # ── Catalog-api: app versioning & store links ─────────────────────────
          MIN_APP_VERSION_SOFT=${{ secrets.MIN_APP_VERSION_SOFT }}
          MIN_APP_VERSION_HARD=${{ secrets.MIN_APP_VERSION_HARD }}
          LATEST_APP_VERSION=${{ secrets.LATEST_APP_VERSION }}
          APP_STORE_URL_IOS=${{ secrets.APP_STORE_URL_IOS }}
          APP_STORE_URL_ANDROID=${{ secrets.APP_STORE_URL_ANDROID }}
          # ── Catalog-api: ads ──────────────────────────────────────────────────
          ADS_ENABLED=${{ secrets.ADS_ENABLED }}
          ADSENSE_PUBLISHER_ID=${{ secrets.ADSENSE_PUBLISHER_ID }}
          ADMOB_APP_ID_IOS=${{ secrets.ADMOB_APP_ID_IOS }}
          ADMOB_APP_ID_ANDROID=${{ secrets.ADMOB_APP_ID_ANDROID }}
          # ── Catalog-api: image storage ────────────────────────────────────────
          IMAGE_STORAGE=${{ secrets.IMAGE_STORAGE }}
          # ── Catalog-api: browser-translation pool ─────────────────────────────
          BROWSER_POOL_SIZE=${{ secrets.BROWSER_POOL_SIZE }}
          BROWSER_MAX_TRANSLATIONS=${{ secrets.BROWSER_MAX_TRANSLATIONS }}
          BROWSER_HEADLESS=${{ secrets.BROWSER_HEADLESS }}
          # ── Shared: GCP / observability ───────────────────────────────────────
          GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
          GOOGLE_CLOUD_PROJECT=${{ secrets.GOOGLE_CLOUD_PROJECT }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          BACKUP_GCS_BUCKET=${{ secrets.BACKUP_GCS_BUCKET }}
          # ── Scraper-api: API keys ─────────────────────────────────────────────
          SCRAPER_GEMINI_API_KEY=${{ secrets.SCRAPER_GEMINI_API_KEY }}
          SCRAPER_FOURSQUARE_API_KEY=${{ secrets.SCRAPER_FOURSQUARE_API_KEY }}
          SCRAPER_OUTSCRAPER_API_KEY=${{ secrets.SCRAPER_OUTSCRAPER_API_KEY }}
          SCRAPER_BESTTIME_API_KEY=${{ secrets.SCRAPER_BESTTIME_API_KEY }}
          # ── Scraper-api: server config ────────────────────────────────────────
          SCRAPER_ALLOWED_ORIGINS=${{ secrets.SCRAPER_ALLOWED_ORIGINS }}
          SCRAPER_TIMEZONE=${{ secrets.SCRAPER_TIMEZONE }}
          SCRAPER_DB_PATH=${{ secrets.SCRAPER_DB_PATH }}
          # ── Scraper-api: DB pool ──────────────────────────────────────────────
          SCRAPER_POOL_SIZE=${{ secrets.SCRAPER_POOL_SIZE }}
          SCRAPER_MAX_OVERFLOW=${{ secrets.SCRAPER_MAX_OVERFLOW }}
          SCRAPER_POOL_TIMEOUT=${{ secrets.SCRAPER_POOL_TIMEOUT }}
          # ── Scraper-api: concurrency / throughput ─────────────────────────────
          SCRAPER_DISCOVERY_CONCURRENCY=${{ secrets.SCRAPER_DISCOVERY_CONCURRENCY }}
          SCRAPER_DETAIL_CONCURRENCY=${{ secrets.SCRAPER_DETAIL_CONCURRENCY }}
          SCRAPER_ENRICHMENT_CONCURRENCY=${{ secrets.SCRAPER_ENRICHMENT_CONCURRENCY }}
          SCRAPER_OVERPASS_CONCURRENCY=${{ secrets.SCRAPER_OVERPASS_CONCURRENCY }}
          SCRAPER_OVERPASS_JITTER_MAX=${{ secrets.SCRAPER_OVERPASS_JITTER_MAX }}
          SCRAPER_IMAGE_CONCURRENCY=${{ secrets.SCRAPER_IMAGE_CONCURRENCY }}
          # ── Scraper-api: per-place budgets ────────────────────────────────────
          SCRAPER_MAX_PHOTOS=${{ secrets.SCRAPER_MAX_PHOTOS }}
          SCRAPER_MAX_REVIEWS=${{ secrets.SCRAPER_MAX_REVIEWS }}
          SCRAPER_MAX_REVIEW_IMAGES=${{ secrets.SCRAPER_MAX_REVIEW_IMAGES }}
          # ── Scraper-api: quality gates ────────────────────────────────────────
          SCRAPER_GATE_IMAGE_DOWNLOAD=${{ secrets.SCRAPER_GATE_IMAGE_DOWNLOAD }}
          SCRAPER_GATE_ENRICHMENT=${{ secrets.SCRAPER_GATE_ENRICHMENT }}
          SCRAPER_GATE_SYNC=${{ secrets.SCRAPER_GATE_SYNC }}
          # ── Scraper-api: post-run automation ──────────────────────────────────
          SCRAPER_AUTO_SYNC_AFTER_RUN=${{ secrets.SCRAPER_AUTO_SYNC_AFTER_RUN }}
          SCRAPER_TRIGGER_SEO_AFTER_SYNC=${{ secrets.SCRAPER_TRIGGER_SEO_AFTER_SYNC }}
          CLOUD_RUN_CATALOG_URL=${{ secrets.CLOUD_RUN_CATALOG_URL }}
          # ── Scraper-api: Cloud Run dispatch (regions comma-list) ──────────────
          CLOUD_RUN_REGIONS=${{ secrets.CLOUD_RUN_REGIONS }}
          # ── Scraper-api: browser grid / Playwright pool ───────────────────────
          BROWSER_GRID_CELL_SIZE_KM=${{ secrets.BROWSER_GRID_CELL_SIZE_KM }}
          MAPS_BROWSER_POOL_SIZE=${{ secrets.MAPS_BROWSER_POOL_SIZE }}
          MAPS_BROWSER_MAX_PAGES=${{ secrets.MAPS_BROWSER_MAX_PAGES }}
          MAPS_BROWSER_HEADLESS=${{ secrets.MAPS_BROWSER_HEADLESS }}
          MAPS_BROWSER_CONCURRENCY=${{ secrets.MAPS_BROWSER_CONCURRENCY }}
          MAPS_BROWSER_CELL_DELAY_MIN=${{ secrets.MAPS_BROWSER_CELL_DELAY_MIN }}
          MAPS_BROWSER_CELL_DELAY_MAX=${{ secrets.MAPS_BROWSER_CELL_DELAY_MAX }}
          BROWSER_PROXY_LIST=${{ secrets.BROWSER_PROXY_LIST }}
          BROWSER_PROXY_ROTATION=${{ secrets.BROWSER_PROXY_ROTATION }}
          BROWSER_SOCS_COOKIE=${{ secrets.BROWSER_SOCS_COOKIE }}
          MEMORY_LIMIT_MB=${{ secrets.MEMORY_LIMIT_MB }}
          # ── Scraper-api: Wikipedia enrichment ─────────────────────────────────
          WIKIPEDIA_MAX_DISTANCE_KM=${{ secrets.WIKIPEDIA_MAX_DISTANCE_KM }}
          ENVEOF

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'bash -s' <<'SCRIPT'
          set -eo pipefail
          cd /opt/soulstep

          # Pull latest docker-compose + nginx configs
          git pull origin main

          # Authenticate to GHCR (using a short-lived token passed via env is not possible here;
          # GHCR packages must be set to public — see vm-bootstrap.sh for instructions)
          # Ensure postgres is up (no-op if already running; initialises on first deploy)
          docker compose -f docker-compose.prod.yml up -d postgres
          docker compose -f docker-compose.prod.yml pull catalog-api scraper-api

          # catalog-api startup runs alembic migrations automatically (lifespan hook)
          docker compose -f docker-compose.prod.yml up -d \
            --remove-orphans \
            --force-recreate \
            catalog-api scraper-api

          # Wait for both services to be healthy (30 × 5s = 150s max)
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            CAT_OK=false
            SCR_OK=false
            docker compose -f docker-compose.prod.yml exec -T catalog-api \
              python -c "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')" \
              > /dev/null 2>&1 && CAT_OK=true
            docker compose -f docker-compose.prod.yml exec -T scraper-api \
              python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" \
              > /dev/null 2>&1 && SCR_OK=true
            if [ "$CAT_OK" = "true" ] && [ "$SCR_OK" = "true" ]; then
              echo "Both services healthy after ${i} checks."
              break
            fi
            sleep 5
          done

          # Recreate nginx on every deploy so .env changes (e.g. USE_SSL) are always picked up
          docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate nginx

          # Prune old images to save disk space
          docker image prune -f

          docker compose -f docker-compose.prod.yml ps
          SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ── Deploy: scraper Cloud Run Job (Playwright — stays on Cloud Run) ────────

  deploy-scraper-job:
    name: Update soulstep-scraper-api-job on Cloud Run
    needs: [changes, build-scraper-api]
    if: needs.changes.outputs.scraper == 'true' && needs.build-scraper-api.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: soulstep-scraper-api
          sparse-checkout-cone-mode: true

      - name: Authenticate with GCP (keyless WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - name: Create AR repository if missing
        run: |
          gcloud artifacts repositories create ${{ env.AR_REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --quiet 2>/dev/null || true

      - name: Retag job image to Artifact Registry
        run: |
          GHCR_IMG="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/soulstep-scraper-api-job:${{ env.HEAD_SHA }}"
          AR_IMG="${{ env.AR_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/soulstep-scraper-api-job:${{ env.HEAD_SHA }}"
          docker pull "$GHCR_IMG"
          docker tag "$GHCR_IMG" "$AR_IMG"
          docker push "$AR_IMG"
          echo "AR_JOB_IMAGE=$AR_IMG" >> "$GITHUB_ENV"

      - name: Upsert soulstep-scraper-api-job (primary region)
        run: |
          # Direct VPC Egress (private-ranges-only) — private IPs (10.x.x.x) are
          # routed through the VPC so the job can reach the VM's internal postgres
          # at 10.132.0.2 without a connector. Public IPs (e.g. places.googleapis.com)
          # egress directly to the internet — all-traffic + no Cloud NAT caused
          # ConnectTimeout on external API calls.
          # DATABASE_URL is forwarded at dispatch time via SCRAPER_CLOUD_RUN_DATABASE_URL.
          REGION="${{ env.REGION }}"
          COMMON_FLAGS=(
            --image "$AR_JOB_IMAGE"
            --memory 6Gi --cpu 4
            --task-timeout 86400 --max-retries 1
            --clear-secrets
            --remove-cloudsql-instances "project-fa2d7f52-2bc4-4a46-8ae:europe-west1:soulstep-db"
            --network default
            --subnet default
            --vpc-egress private-ranges-only
            --quiet
          )
          if gcloud run jobs describe soulstep-scraper-api-job --region "$REGION" --quiet 2>/dev/null; then
            gcloud run jobs update soulstep-scraper-api-job --region "$REGION" "${COMMON_FLAGS[@]}"
          else
            gcloud run jobs create soulstep-scraper-api-job --region "$REGION" "${COMMON_FLAGS[@]}"
          fi

      - name: Upsert scraper job in extra regions
        if: env.EXTRA_JOB_REGIONS != ''
        run: |
          for R in $(echo "${{ env.EXTRA_JOB_REGIONS }}" | tr ',' ' '); do
            [ -z "$R" ] && continue
            echo "=== Upsert scraper job in $R ==="
            COMMON_FLAGS=(
              --image "$AR_JOB_IMAGE"
              --memory 6Gi --cpu 4
              --task-timeout 86400 --max-retries 1
              --clear-secrets
              --remove-cloudsql-instances "project-fa2d7f52-2bc4-4a46-8ae:europe-west1:soulstep-db"
              --network default
              --subnet default
              --vpc-egress private-ranges-only
              --quiet
            )
            if gcloud run jobs describe soulstep-scraper-api-job --region "$R" --quiet 2>/dev/null; then
              gcloud run jobs update soulstep-scraper-api-job --region "$R" "${COMMON_FLAGS[@]}"
            else
              gcloud run jobs create soulstep-scraper-api-job --region "$R" "${COMMON_FLAGS[@]}"
            fi
          done
