name: Dependency Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-catalog:
    name: Audit catalog-api dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install and audit
        working-directory: soulstep-catalog-api
        run: |
          uv venv .venv
          uv pip install pip-audit -r requirements.txt
          .venv/bin/pip-audit -r requirements.txt --skip-editable

  audit-scraper:
    name: Audit scraper-api dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install and audit
        working-directory: soulstep-scraper-api
        run: |
          uv venv .venv
          uv pip install pip-audit -r requirements.txt
          .venv/bin/pip-audit -r requirements.txt --skip-editable
