name: Deploy to GCP

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: europe-west1
  PROJECT_ID: project-fa2d7f52-2bc4-4a46-8ae
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: pilgrimage
  API_SERVICE: pilgrimage-api

jobs:
  # ── Gate: tests must pass before any deployment ────────────────────────────

  test-server:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run pytest
        working-directory: server
        run: python -m pytest tests/ -v --tb=short

  test-web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          # Use a placeholder so the build succeeds in CI; real URL is injected
          # at deploy time via the Firebase environment or Cloud Run env vars.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ── Deploy: API → Cloud Run ─────────────────────────────────────────────────

  deploy-api:
    name: Deploy API → Cloud Run
    needs: [test-server, test-web]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          docker build -t "$IMAGE" ./server
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet

  # ── Deploy: Web → Firebase Hosting ─────────────────────────────────────────

  deploy-web:
    name: Deploy Web → Firebase Hosting
    needs: [test-server, test-web]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
