name: Deploy to GCP

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: europe-west1
  PROJECT_ID: project-fa2d7f52-2bc4-4a46-8ae
  PROJECT_NUMBER: "834941457147"
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: soulstep
  API_SERVICE: soulstep-catalog-api
  SA_EMAIL: github-deploy@project-fa2d7f52-2bc4-4a46-8ae.iam.gserviceaccount.com
  WIF_PROVIDER: projects/834941457147/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  # ── Gate: tests must pass before any deployment ────────────────────────────

  test-soulstep-catalog-api:
    name: Soulstep Catalog API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: soulstep-catalog-api/requirements.txt

      - name: Install dependencies
        run: pip install -r soulstep-catalog-api/requirements.txt

      - name: Lint (ruff)
        working-directory: soulstep-catalog-api
        run: pip install ruff && ruff check app/

      - name: Run pytest
        working-directory: soulstep-catalog-api
        run: python -m pytest tests/ -v --tb=short

  test-soulstep-customer-web:
    name: Soulstep Customer Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Typecheck
        working-directory: apps/soulstep-customer-web
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        working-directory: apps/soulstep-customer-web
        run: npm run lint

      - name: Build
        working-directory: apps/soulstep-customer-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADSENSE_PUBLISHER_ID: ${{ secrets.VITE_ADSENSE_PUBLISHER_ID }}

  test-soulstep-admin-web:
    name: soulstep-admin-web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Lint (ESLint - if configured)
        working-directory: apps/soulstep-admin-web
        run: npm run lint || true    # non-blocking until lint is set up

      - name: Run tests
        working-directory: apps/soulstep-admin-web
        run: npm test

      - name: Typecheck
        working-directory: apps/soulstep-admin-web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: npm run build

  # ── Deploy: API → Cloud Run ─────────────────────────────────────────────────

  deploy-api:
    name: Deploy API → Cloud Run
    needs: [test-soulstep-catalog-api, test-soulstep-customer-web, test-soulstep-admin-web]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          docker build -t "$IMAGE" ./soulstep-catalog-api
          docker push "$IMAGE"

      - name: Scan Docker image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet

  # ── Deploy: Web → Firebase Hosting ─────────────────────────────────────────

  deploy-web:
    name: Deploy Web → Firebase Hosting
    needs: [test-soulstep-catalog-api, test-soulstep-customer-web, test-soulstep-admin-web]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Build
        working-directory: apps/soulstep-customer-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADSENSE_PUBLISHER_ID: ${{ secrets.VITE_ADSENSE_PUBLISHER_ID }}

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ${{ env.PROJECT_ID }}
