name: Deploy to GCP

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: europe-west1
  PROJECT_ID: project-fa2d7f52-2bc4-4a46-8ae
  PROJECT_NUMBER: "834941457147"
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: soulstep
  API_SERVICE: soulstep-catalog-api
  SCRAPER_SERVICE: soulstep-scraper-api
  SA_EMAIL: github-deploy@project-fa2d7f52-2bc4-4a46-8ae.iam.gserviceaccount.com
  WIF_PROVIDER: projects/834941457147/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  # ── Detect changed paths ───────────────────────────────────────────────────

  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      scraper: ${{ steps.filter.outputs.scraper }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            catalog:
              - 'soulstep-catalog-api/**'
              - '.github/workflows/deploy.yml'
            scraper:
              - 'soulstep-scraper-api/**'
              - '.github/workflows/deploy.yml'
            web:
              - 'apps/soulstep-customer-web/**'
              - '.github/workflows/deploy.yml'
            admin:
              - 'apps/soulstep-admin-web/**'
              - '.github/workflows/deploy.yml'

  # ── Gate: tests must pass before any deployment ────────────────────────────

  test-soulstep-catalog-api:
    name: Soulstep Catalog API tests
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: soulstep-catalog-api/requirements.txt

      - name: Install dependencies
        run: pip install -r soulstep-catalog-api/requirements.txt

      - name: Lint (ruff)
        working-directory: soulstep-catalog-api
        run: pip install ruff && ruff check app/

      - name: Run pytest
        working-directory: soulstep-catalog-api
        run: python -m pytest tests/ -v --tb=short

  test-soulstep-customer-web:
    name: Soulstep Customer Web typecheck + build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Typecheck
        working-directory: apps/soulstep-customer-web
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        working-directory: apps/soulstep-customer-web
        run: npm run lint

      - name: Build
        working-directory: apps/soulstep-customer-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADSENSE_PUBLISHER_ID: ${{ secrets.VITE_ADSENSE_PUBLISHER_ID }}

  test-soulstep-admin-web:
    name: soulstep-admin-web typecheck + build
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Lint (ESLint - if configured)
        working-directory: apps/soulstep-admin-web
        run: npm run lint || true    # non-blocking until lint is set up

      - name: Run tests
        working-directory: apps/soulstep-admin-web
        run: npm test

      - name: Typecheck
        working-directory: apps/soulstep-admin-web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: npm run build

  test-soulstep-scraper-api:
    name: Soulstep Scraper API tests
    needs: changes
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: soulstep-scraper-api/requirements.txt

      - name: Install dependencies
        run: pip install -r soulstep-scraper-api/requirements.txt

      - name: Lint (ruff)
        working-directory: soulstep-scraper-api
        run: pip install ruff && ruff check app/

      - name: Run pytest
        working-directory: soulstep-scraper-api
        run: python -m pytest tests/ -v --tb=short

  # ── Deploy: API → Cloud Run ─────────────────────────────────────────────────

  deploy-api:
    name: Deploy API → Cloud Run
    needs: [changes, test-soulstep-catalog-api]
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          docker build -t "$IMAGE" ./soulstep-catalog-api
          docker push "$IMAGE"

      - name: Scan Docker image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db" \
            --quiet

  # ── Deploy: Web → Firebase Hosting ─────────────────────────────────────────

  deploy-web:
    name: Deploy Web → Firebase Hosting
    needs: [changes, test-soulstep-customer-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Build
        working-directory: apps/soulstep-customer-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADSENSE_PUBLISHER_ID: ${{ secrets.VITE_ADSENSE_PUBLISHER_ID }}

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Firebase Hosting (customer)
        run: npx firebase-tools deploy --only hosting:customer --project ${{ env.PROJECT_ID }}

  # ── Deploy: Admin Web → Firebase Hosting ────────────────────────────────────

  deploy-admin-web:
    name: Deploy Admin Web → Firebase Hosting
    needs: [changes, test-soulstep-admin-web]
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Firebase Hosting (admin)
        # Prerequisites (one-time, in Firebase console):
        #   1. Create a second Hosting site: Project settings → Hosting → Add site
        #   2. Note the site ID (e.g. soulstep-admin) and update .firebaserc targets.admin
        run: npx firebase-tools deploy --only hosting:admin --project ${{ env.PROJECT_ID }}

  # ── Deploy: Scraper API → Cloud Run ─────────────────────────────────────────

  deploy-scraper:
    name: Deploy Scraper API → Cloud Run
    needs: [changes, test-soulstep-scraper-api]
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper:${{ github.sha }}"
          docker build -t "$IMAGE" ./soulstep-scraper-api
          docker push "$IMAGE"

      - name: Scan Docker image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SCRAPER_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db" \
            --timeout 3600 \
            --max-instances 1 \
            --set-env-vars "MAIN_SERVER_URL=https://soulstep-catalog-api-${{ env.PROJECT_NUMBER }}.${{ env.REGION }}.run.app,LOG_FORMAT=json,LOG_LEVEL=DEBUG,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},SCRAPER_TIMEZONE=Asia/Dubai,SCRAPER_DB_PATH=/tmp/scraper.db" \
            --set-secrets "DATABASE_URL=SCRAPER_DATABASE_URL:latest,GOOGLE_MAPS_API_KEY=SCRAPER_GOOGLE_MAPS_API_KEY:latest,FOURSQUARE_API_KEY=SCRAPER_FOURSQUARE_API_KEY:latest,ANTHROPIC_API_KEY=SCRAPER_ANTHROPIC_API_KEY:latest" \
            --quiet
