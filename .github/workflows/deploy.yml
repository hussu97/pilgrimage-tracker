name: Deploy to GCP

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGION: europe-west1
  PROJECT_ID: project-fa2d7f52-2bc4-4a46-8ae
  PROJECT_NUMBER: "834941457147"
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: soulstep
  API_SERVICE: soulstep-catalog-api
  SCRAPER_SERVICE: soulstep-scraper-api
  SA_EMAIL: github-deploy@project-fa2d7f52-2bc4-4a46-8ae.iam.gserviceaccount.com
  WIF_PROVIDER: projects/834941457147/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  # ── Detect changed paths ───────────────────────────────────────────────────

  changes:
    name: Read path filter outputs from tests
    runs-on: ubuntu-latest
    # Only deploy when tests passed — if tests were skipped (no relevant files
    # changed) the conclusion is still 'success', so this correctly gates on failure.
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read   # required to download artifacts from the triggering run
      contents: read
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      scraper: ${{ steps.filter.outputs.scraper }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      # Download the path filter results computed by tests.yml — same detection,
      # no risk of HEAD~1 drift on multi-commit pushes.
      - uses: actions/download-artifact@v4
        with:
          name: path-filter-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Load filter outputs
        id: filter
        run: |
          echo "catalog=$(jq -r .catalog path-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "scraper=$(jq -r .scraper path-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "web=$(jq -r .web path-outputs.json)"     >> "$GITHUB_OUTPUT"
          echo "admin=$(jq -r .admin path-outputs.json)" >> "$GITHUB_OUTPUT"

  # ── Deploy: API → Cloud Run ─────────────────────────────────────────────────

  deploy-api:
    name: Deploy soulstep-catalog-api → Cloud Run
    needs: [changes]
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: soulstep-catalog-api
          sparse-checkout-cone-mode: true

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push soulstep-catalog-api image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-catalog-api:${{ env.HEAD_SHA }}"
          CACHE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-catalog-api:cache"
          docker buildx build --platform linux/amd64 \
            --cache-from "type=registry,ref=$CACHE" \
            --cache-to   "type=registry,ref=$CACHE,mode=max" \
            --provenance=false \
            -t "$IMAGE" --push ./soulstep-catalog-api

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan soulstep-catalog-api image for vulnerabilities (Trivy)
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-catalog-api:${{ env.HEAD_SHA }}"

      - name: Deploy soulstep-catalog-api to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-catalog-api:${{ env.HEAD_SHA }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db" \
            --quiet

  # ── Deploy: Web → Firebase Hosting ─────────────────────────────────────────

  deploy-web:
    name: Deploy soulstep-customer-web → Firebase Hosting
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: apps/soulstep-customer-web
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Build
        working-directory: apps/soulstep-customer-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADSENSE_PUBLISHER_ID: ${{ secrets.VITE_ADSENSE_PUBLISHER_ID }}
          VITE_UMAMI_WEBSITE_ID: ${{ secrets.VITE_UMAMI_WEBSITE_ID }}

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Firebase Hosting (customer)
        run: npx firebase-tools deploy --only hosting:customer --project ${{ env.PROJECT_ID }}

  # ── Deploy: Admin Web → Firebase Hosting ────────────────────────────────────

  deploy-admin-web:
    name: Deploy soulstep-admin-web → Firebase Hosting
    needs: [changes]
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: apps/soulstep-admin-web
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Firebase Hosting (admin)
        # Prerequisites (one-time, in Firebase console):
        #   1. Create a second Hosting site: Project settings → Hosting → Add site
        #   2. Note the site ID (e.g. soulstep-admin) and update .firebaserc targets.admin
        run: npx firebase-tools deploy --only hosting:admin --project ${{ env.PROJECT_ID }}

  # ── Deploy: Cloud Run Jobs → update image on every catalog change ───────────

  deploy-jobs:
    name: Update Cloud Run Jobs
    needs: [changes, deploy-api]
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: soulstep-catalog-api
          sparse-checkout-cone-mode: true

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sync-places and translate-content images (parallel)
        run: |
          SYNC="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/sync-places:${{ env.HEAD_SHA }}"
          SYNC_CACHE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/sync-places:cache"
          TRANSLATE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/translate-content:${{ env.HEAD_SHA }}"
          TRANSLATE_CACHE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/translate-content:cache"

          docker buildx build --platform linux/amd64 \
            --cache-from "type=registry,ref=$SYNC_CACHE" \
            --cache-to   "type=registry,ref=$SYNC_CACHE,mode=max" \
            --provenance=false \
            -f soulstep-catalog-api/Dockerfile.sync -t "$SYNC" --push ./soulstep-catalog-api &
          PID1=$!

          docker buildx build --platform linux/amd64 \
            --cache-from "type=registry,ref=$TRANSLATE_CACHE" \
            --cache-to   "type=registry,ref=$TRANSLATE_CACHE,mode=max" \
            --provenance=false \
            -f soulstep-catalog-api/Dockerfile.translate -t "$TRANSLATE" --push ./soulstep-catalog-api &
          PID2=$!

          wait $PID1 $PID2

      - name: Update or create Cloud Run Jobs
        run: |
          CLOUDSQL="${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db"
          API="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-catalog-api:${{ env.HEAD_SHA }}"
          SYNC="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/sync-places:${{ env.HEAD_SHA }}"
          TRANSLATE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/translate-content:${{ env.HEAD_SHA }}"

          # update if exists, create if not — idempotent on every push
          _upsert() {
            local name=$1; shift
            gcloud run jobs update "$name" --region ${{ env.REGION }} "$@" 2>/dev/null \
              || gcloud run jobs create "$name" --region ${{ env.REGION }} "$@"
          }

          # a. cleanup-job (uses api image)
          _upsert cleanup-job \
            --image "$API" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --command "python" --args="-m,app.jobs.cleanup_orphaned_images" \
            --max-retries 1 --task-timeout 300 --memory 512Mi --cpu 1

          # b. backfill-timezones (uses api image)
          _upsert backfill-timezones \
            --image "$API" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --command "python" --args="-m,app.jobs.backfill_timezones" \
            --max-retries 1 --task-timeout 300 --memory 512Mi --cpu 1

          # d. sync-places (uses sync-places image)
          # SCRAPER_DATABASE_URL already exists in Secret Manager (shared with scraper service)
          _upsert sync-places \
            --image "$SYNC" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,SCRAPER_DATABASE_URL=SCRAPER_DATABASE_URL:latest" \
            --memory 1Gi --cpu 1 \
            --task-timeout 1800 --max-retries 1

          # e. translate-content (uses translate-content image)
          _upsert translate-content \
            --image "$TRANSLATE" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --memory 4Gi --cpu 2 \
            --task-timeout 900 --max-retries 0

  # ── Deploy: Scraper API → Cloud Run ─────────────────────────────────────────

  deploy-scraper:
    name: Deploy soulstep-scraper-api → Cloud Run
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: soulstep-scraper-api
          sparse-checkout-cone-mode: true

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push lean and Playwright images (parallel)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-scraper-api:${{ env.HEAD_SHA }}"
          IMAGE_CACHE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-scraper-api:cache"
          JOB_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-scraper-api-job:${{ env.HEAD_SHA }}"
          JOB_CACHE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-scraper-api-job:cache"

          # Lean API image (no Playwright)
          docker buildx build --platform linux/amd64 \
            --cache-from "type=registry,ref=$IMAGE_CACHE" \
            --cache-to   "type=registry,ref=$IMAGE_CACHE,mode=max" \
            --provenance=false \
            -f soulstep-scraper-api/Dockerfile -t "$IMAGE" --push ./soulstep-scraper-api &
          PID1=$!

          # Job image (Playwright + Chromium)
          docker buildx build --platform linux/amd64 \
            --cache-from "type=registry,ref=$JOB_CACHE" \
            --cache-to   "type=registry,ref=$JOB_CACHE,mode=max" \
            --provenance=false \
            -f soulstep-scraper-api/Dockerfile.job -t "$JOB_IMAGE" --push ./soulstep-scraper-api &
          PID2=$!

          wait $PID1 $PID2

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan soulstep-scraper-api image for vulnerabilities (Trivy)
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-scraper-api:${{ env.HEAD_SHA }}"

      - name: Deploy soulstep-scraper-api service to Cloud Run
        run: |
          gcloud run deploy ${{ env.SCRAPER_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-scraper-api:${{ env.HEAD_SHA }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db" \
            --timeout 3600 \
            --max-instances 1 \
            --no-cpu-throttling \
            --quiet

      - name: Upsert Cloud Run Job (soulstep-scraper-api-job)
        run: |
          JOB_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/soulstep-scraper-api-job:${{ env.HEAD_SHA }}"
          CLOUDSQL="${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db"

          # update if exists, create if not — same pattern as deploy-jobs
          _upsert() {
            local name=$1; shift
            gcloud run jobs update "$name" --region ${{ env.REGION }} "$@" 2>/dev/null \
              || gcloud run jobs create "$name" --region ${{ env.REGION }} "$@"
          }

          _upsert soulstep-scraper-api-job \
            --image "$JOB_IMAGE" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --memory 8Gi --cpu 4 \
            --task-timeout 86400 --max-retries 1 \
            --quiet
