name: Deploy to GCP

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: europe-west1
  PROJECT_ID: project-fa2d7f52-2bc4-4a46-8ae
  PROJECT_NUMBER: "834941457147"
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: soulstep
  API_SERVICE: soulstep-catalog-api
  SCRAPER_SERVICE: soulstep-scraper-api
  SA_EMAIL: github-deploy@project-fa2d7f52-2bc4-4a46-8ae.iam.gserviceaccount.com
  WIF_PROVIDER: projects/834941457147/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  # ── Detect changed paths ───────────────────────────────────────────────────

  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      scraper: ${{ steps.filter.outputs.scraper }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            catalog:
              - 'soulstep-catalog-api/**'
              - '.github/workflows/deploy.yml'
            scraper:
              - 'soulstep-scraper-api/**'
              - '.github/workflows/deploy.yml'
            web:
              - 'apps/soulstep-customer-web/**'
              - '.github/workflows/deploy.yml'
            admin:
              - 'apps/soulstep-admin-web/**'
              - '.github/workflows/deploy.yml'

  # ── Gate: tests must pass before any deployment ────────────────────────────

  test-soulstep-catalog-api:
    name: Soulstep Catalog API tests
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: soulstep-catalog-api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r soulstep-catalog-api/requirements-dev.txt

      - name: Lint (ruff)
        working-directory: soulstep-catalog-api
        run: ruff check app/

      - name: Run pytest
        working-directory: soulstep-catalog-api
        run: python -m pytest tests/ -v --tb=short

  test-soulstep-customer-web:
    name: Soulstep Customer Web typecheck + build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Typecheck
        working-directory: apps/soulstep-customer-web
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        working-directory: apps/soulstep-customer-web
        run: npm run lint

      - name: Build
        working-directory: apps/soulstep-customer-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADSENSE_PUBLISHER_ID: ${{ secrets.VITE_ADSENSE_PUBLISHER_ID }}

  test-soulstep-admin-web:
    name: soulstep-admin-web typecheck + build
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Lint (ESLint - if configured)
        working-directory: apps/soulstep-admin-web
        run: npm run lint || true    # non-blocking until lint is set up

      - name: Run tests
        working-directory: apps/soulstep-admin-web
        run: npm test

      - name: Typecheck
        working-directory: apps/soulstep-admin-web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: npm run build

  test-soulstep-scraper-api:
    name: Soulstep Scraper API tests
    needs: changes
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: soulstep-scraper-api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r soulstep-scraper-api/requirements-dev.txt

      - name: Lint (ruff)
        working-directory: soulstep-scraper-api
        run: ruff check app/

      - name: Run pytest
        working-directory: soulstep-scraper-api
        run: python -m pytest tests/ -v --tb=short

  # ── Deploy: API → Cloud Run ─────────────────────────────────────────────────

  deploy-api:
    name: Deploy API → Cloud Run
    needs: [changes, test-soulstep-catalog-api]
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          docker build --platform linux/amd64 -t "$IMAGE" ./soulstep-catalog-api
          docker push "$IMAGE"

      - name: Scan Docker image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db" \
            --quiet

  # ── Deploy: Web → Firebase Hosting ─────────────────────────────────────────

  deploy-web:
    name: Deploy Web → Firebase Hosting
    needs: [changes, test-soulstep-customer-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Build
        working-directory: apps/soulstep-customer-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADSENSE_PUBLISHER_ID: ${{ secrets.VITE_ADSENSE_PUBLISHER_ID }}

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Firebase Hosting (customer)
        run: npx firebase-tools deploy --only hosting:customer --project ${{ env.PROJECT_ID }}

  # ── Deploy: Admin Web → Firebase Hosting ────────────────────────────────────

  deploy-admin-web:
    name: Deploy Admin Web → Firebase Hosting
    needs: [changes, test-soulstep-admin-web]
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "ERROR: VITE_API_URL secret is not set. Add it to GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Deploy to Firebase Hosting (admin)
        # Prerequisites (one-time, in Firebase console):
        #   1. Create a second Hosting site: Project settings → Hosting → Add site
        #   2. Note the site ID (e.g. soulstep-admin) and update .firebaserc targets.admin
        run: npx firebase-tools deploy --only hosting:admin --project ${{ env.PROJECT_ID }}

  # ── Deploy: Cloud Run Jobs → update image on every catalog change ───────────

  deploy-jobs:
    name: Update Cloud Run Jobs
    needs: [changes, deploy-api]
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push sync-places image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/sync-places:${{ github.sha }}"
          docker build --platform linux/amd64 -f soulstep-catalog-api/Dockerfile.sync -t "$IMAGE" ./soulstep-catalog-api
          docker push "$IMAGE"

      - name: Build and push translate-content image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/translate-content:${{ github.sha }}"
          docker build --platform linux/amd64 -f soulstep-catalog-api/Dockerfile.translate -t "$IMAGE" ./soulstep-catalog-api
          docker push "$IMAGE"

      - name: Update or create Cloud Run Jobs
        run: |
          CLOUDSQL="${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db"
          API="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/api:${{ github.sha }}"
          SYNC="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/sync-places:${{ github.sha }}"
          TRANSLATE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/translate-content:${{ github.sha }}"

          # update if exists, create if not — idempotent on every push
          _upsert() {
            local name=$1; shift
            gcloud run jobs update "$name" --region ${{ env.REGION }} "$@" 2>/dev/null \
              || gcloud run jobs create "$name" --region ${{ env.REGION }} "$@"
          }

          # a. cleanup-job (uses api image)
          _upsert cleanup-job \
            --image "$API" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --command "python" --args="-m,app.jobs.cleanup_orphaned_images" \
            --max-retries 1 --task-timeout 300 --memory 512Mi --cpu 1

          # b. backfill-timezones (uses api image)
          _upsert backfill-timezones \
            --image "$API" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --command "python" --args="-m,app.jobs.backfill_timezones" \
            --max-retries 1 --task-timeout 300 --memory 512Mi --cpu 1

          # d. sync-places (uses sync-places image)
          # SCRAPER_DATABASE_URL already exists in Secret Manager (shared with scraper service)
          _upsert sync-places \
            --image "$SYNC" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,SCRAPER_DATABASE_URL=SCRAPER_DATABASE_URL:latest" \
            --memory 1Gi --cpu 1 \
            --task-timeout 1800 --max-retries 1

          # e. translate-content (uses translate-content image)
          _upsert translate-content \
            --image "$TRANSLATE" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --memory 4Gi --cpu 2 \
            --task-timeout 86400 --max-retries 0

  # ── Deploy: Scraper API → Cloud Run ─────────────────────────────────────────

  deploy-scraper:
    name: Deploy Scraper API → Cloud Run
    needs: [changes, test-soulstep-scraper-api]
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push API image (lean — no Playwright)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper:${{ github.sha }}"
          docker build --platform linux/amd64 -f Dockerfile -t "$IMAGE" ./soulstep-scraper-api
          docker push "$IMAGE"

      - name: Build and push Job image (Playwright + Chromium)
        run: |
          JOB_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper-job:${{ github.sha }}"
          docker build --platform linux/amd64 -f Dockerfile.job -t "$JOB_IMAGE" ./soulstep-scraper-api
          docker push "$JOB_IMAGE"

      - name: Scan API image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Deploy API Service to Cloud Run
        run: |
          gcloud run deploy ${{ env.SCRAPER_SERVICE }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:soulstep-db" \
            --timeout 3600 \
            --max-instances 1 \
            --set-env-vars "MAIN_SERVER_URL=https://soulstep-catalog-api-${{ env.PROJECT_NUMBER }}.${{ env.REGION }}.run.app,LOG_FORMAT=json,LOG_LEVEL=DEBUG,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},SCRAPER_TIMEZONE=Asia/Dubai,SCRAPER_DB_PATH=/tmp/scraper.db" \
            --set-secrets "DATABASE_URL=SCRAPER_DATABASE_URL:latest,GOOGLE_MAPS_API_KEY=SCRAPER_GOOGLE_MAPS_API_KEY:latest,FOURSQUARE_API_KEY=SCRAPER_FOURSQUARE_API_KEY:latest,GEMINI_API_KEY=SCRAPER_GEMINI_API_KEY:latest" \
            --quiet

      - name: Update Cloud Run Job image (if job exists)
        run: |
          JOB_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/scraper-job:${{ github.sha }}"
          if gcloud run jobs describe soulstep-scraper-job --region ${{ env.REGION }} --quiet 2>/dev/null; then
            gcloud run jobs update soulstep-scraper-job \
              --image "$JOB_IMAGE" \
              --region ${{ env.REGION }} \
              --quiet
          else
            echo "Cloud Run Job 'soulstep-scraper-job' does not exist yet — skipping update."
            echo "Create it with: gcloud run jobs create soulstep-scraper-job --image $JOB_IMAGE --memory 2Gi --cpu 2 --task-timeout 86400 --max-retries 1 --region ${{ env.REGION }}"
          fi
