name: Deploy - Vercel

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  # ── Detect changed paths ────────────────────────────────────────────────────

  changes:
    name: Read path filter outputs from tests
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: path-filter-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Load filter outputs
        id: filter
        run: |
          echo "web=$(jq -r .web path-outputs.json)"     >> "$GITHUB_OUTPUT"
          echo "admin=$(jq -r .admin path-outputs.json)" >> "$GITHUB_OUTPUT"

  # ── Deploy: Customer Web → Vercel ────────────────────────────────────────────

  deploy-web:
    name: Deploy soulstep-customer-web → Vercel
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: apps/soulstep-customer-web
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Cache Next.js build artifacts
        uses: actions/cache@v4
        with:
          path: apps/soulstep-customer-web/.next/cache
          key: nextjs-web-${{ hashFiles('apps/soulstep-customer-web/package-lock.json') }}-${{ env.HEAD_SHA }}
          restore-keys: |
            nextjs-web-${{ hashFiles('apps/soulstep-customer-web/package-lock.json') }}-

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Pull Vercel environment info
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── Deploy: Admin Web → Vercel ───────────────────────────────────────────────

  deploy-admin-web:
    name: Deploy soulstep-admin-web → Vercel
    needs: [changes]
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          sparse-checkout: apps/soulstep-admin-web
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Cache Vite build artifacts
        uses: actions/cache@v4
        with:
          path: apps/soulstep-admin-web/node_modules/.vite
          key: vite-admin-${{ hashFiles('apps/soulstep-admin-web/package-lock.json') }}-${{ env.HEAD_SHA }}
          restore-keys: |
            vite-admin-${{ hashFiles('apps/soulstep-admin-web/package-lock.json') }}-

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Pull Vercel environment info
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
