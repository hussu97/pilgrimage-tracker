name: Update VM .env

# Run manually whenever secrets change — no code push needed.
on:
  workflow_dispatch:

jobs:
  update-env:
    name: Write .env to VM + restart services
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write .env on VM
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cat > /opt/soulstep/.env" <<'ENVEOF'
          USE_SSL=${{ secrets.USE_SSL }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CATALOG_API_KEY=${{ secrets.CATALOG_API_KEY }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          RESET_URL_BASE=${{ secrets.RESET_URL_BASE }}
          GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
          GOOGLE_CLOUD_PROJECT=${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GLITCHTIP_DSN=${{ secrets.GLITCHTIP_DSN }}
          ADS_ENABLED=${{ secrets.ADS_ENABLED }}
          ADSENSE_PUBLISHER_ID=${{ secrets.ADSENSE_PUBLISHER_ID }}
          SCRAPER_GOOGLE_MAPS_API_KEY=${{ secrets.SCRAPER_GOOGLE_MAPS_API_KEY }}
          SCRAPER_GEMINI_API_KEY=${{ secrets.SCRAPER_GEMINI_API_KEY }}
          SCRAPER_FOURSQUARE_API_KEY=${{ secrets.SCRAPER_FOURSQUARE_API_KEY }}
          SCRAPER_ALLOWED_ORIGINS=${{ secrets.SCRAPER_ALLOWED_ORIGINS }}
          SCRAPER_TIMEZONE=${{ secrets.SCRAPER_TIMEZONE }}
          CLOUD_RUN_REGIONS=${{ secrets.CLOUD_RUN_REGIONS }}
          BACKUP_GCS_BUCKET=${{ secrets.BACKUP_GCS_BUCKET }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          ENVEOF

      - name: Restart services to pick up new env
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" 'bash -s' <<'SCRIPT'
          set -eo pipefail
          cd /opt/soulstep

          echo "Restarting services with updated .env..."
          docker compose -f docker-compose.prod.yml up -d \
            --force-recreate \
            catalog-api scraper-api

          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            CAT_OK=false
            SCR_OK=false
            docker compose -f docker-compose.prod.yml exec -T catalog-api \
              python -c "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')" \
              > /dev/null 2>&1 && CAT_OK=true
            docker compose -f docker-compose.prod.yml exec -T scraper-api \
              python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" \
              > /dev/null 2>&1 && SCR_OK=true
            if [ "$CAT_OK" = "true" ] && [ "$SCR_OK" = "true" ]; then
              echo "Both services healthy after ${i} checks."
              break
            fi
            sleep 5
          done

          docker compose -f docker-compose.prod.yml ps
          SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
