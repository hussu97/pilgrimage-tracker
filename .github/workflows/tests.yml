name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run pytest
        working-directory: server
        run: python -m pytest tests/ -v --tb=short

  data-scraper:
    name: Data scraper tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data_scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r data_scraper/requirements.txt

      - name: Run pytest
        working-directory: data_scraper
        run: python -m pytest tests/ -v --tb=short
