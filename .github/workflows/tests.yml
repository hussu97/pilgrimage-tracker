name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      scraper: ${{ steps.filter.outputs.scraper }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            catalog:
              - 'soulstep-catalog-api/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/deploy-vm.yml'
              - 'README.md'
            scraper:
              - 'soulstep-scraper-api/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/deploy-vm.yml'
              - 'README.md'
            web:
              - 'apps/soulstep-customer-web/**'
              - 'firebase.json'
              - '.firebaserc'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/deploy-vm.yml'
              - 'README.md'
            mobile:
              - 'apps/soulstep-customer-mobile/**'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy-vm.yml'
              - 'README.md'
            admin:
              - 'apps/soulstep-admin-web/**'
              - 'firebase.json'
              - '.firebaserc'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/deploy-vm.yml'
              - 'README.md'
      # Export results so deploy.yml can consume the exact same detection
      - name: Save path filter outputs
        run: |
          printf '{"catalog":"%s","scraper":"%s","web":"%s","admin":"%s"}' \
            "${{ steps.filter.outputs.catalog }}" \
            "${{ steps.filter.outputs.scraper }}" \
            "${{ steps.filter.outputs.web }}" \
            "${{ steps.filter.outputs.admin }}" \
            > path-outputs.json
      - uses: actions/upload-artifact@v4
        with:
          name: path-filter-outputs
          path: path-outputs.json
          retention-days: 1

  soulstep-catalog-api:
    name: soulstep-catalog-api tests
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "soulstep-catalog-api/requirements-dev.txt"

      - name: Install dependencies
        working-directory: soulstep-catalog-api
        run: |
          uv venv .venv
          uv pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: soulstep-catalog-api
        run: >-
          .venv/bin/python -m pytest tests/
          -n auto
          --tb=short
          --durations=10
          ${{ github.ref == 'refs/heads/main' && '--cov=app --cov-report=term-missing --cov-fail-under=80' || '' }}

  soulstep-scraper-api:
    name: soulstep-scraper-api tests
    needs: changes
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "soulstep-scraper-api/requirements-dev.txt"

      - name: Install dependencies
        working-directory: soulstep-scraper-api
        run: |
          uv venv .venv
          uv pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: soulstep-scraper-api
        run: >-
          .venv/bin/python -m pytest tests/
          -n auto
          --tb=short
          --durations=10
          ${{ github.ref == 'refs/heads/main' && '--cov=app --cov-report=term-missing --cov-fail-under=75' || '' }}

  soulstep-customer-web:
    name: soulstep-customer-web tests
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-web
        run: npm run test -- --coverage

  soulstep-customer-mobile:
    name: soulstep-customer-mobile tests
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-mobile
        run: npm ci

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-mobile
        run: npm test -- --coverage

  soulstep-admin-web:
    name: soulstep-admin-web tests
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Run tests with coverage
        working-directory: apps/soulstep-admin-web
        run: npm run test:coverage

      - name: Typecheck
        working-directory: apps/soulstep-admin-web
        run: npx tsc --noEmit
