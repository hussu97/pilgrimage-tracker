name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}

jobs:
  soulstep-catalog-api:
    name: soulstep-catalog-api tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: soulstep-catalog-api/requirements.txt

      - name: Install dependencies
        run: pip install -r soulstep-catalog-api/requirements.txt

      - name: Run pytest
        working-directory: soulstep-catalog-api
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  soulstep-scraper-api:
    name: soulstep-scraper-api tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: soulstep-scraper-api/requirements.txt

      - name: Install dependencies
        run: pip install -r soulstep-scraper-api/requirements.txt

      - name: Run pytest
        working-directory: soulstep-scraper-api
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  soulstep-customer-web:
    name: Soulstep Customer Web frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-web
        run: npm run test -- --coverage

  soulstep-customer-mobile:
    name: Soulstep Customer Mobile frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-mobile
        run: npm ci

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-mobile
        run: npm test -- --coverage
