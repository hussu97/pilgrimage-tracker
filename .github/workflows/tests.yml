name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      scraper: ${{ steps.filter.outputs.scraper }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            catalog:
              - 'soulstep-catalog-api/**'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
            scraper:
              - 'soulstep-scraper-api/**'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
            web:
              - 'apps/soulstep-customer-web/**'
              - 'firebase.json'
              - '.firebaserc'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
            mobile:
              - 'apps/soulstep-customer-mobile/**'
              - '.github/workflows/tests.yml'
            admin:
              - 'apps/soulstep-admin-web/**'
              - 'firebase.json'
              - '.firebaserc'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'

  soulstep-catalog-api:
    name: soulstep-catalog-api tests
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: soulstep-catalog-api/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r soulstep-catalog-api/requirements-dev.txt
          pip install pip-audit

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r soulstep-catalog-api/requirements.txt --skip-editable || true

      - name: Run pytest
        working-directory: soulstep-catalog-api
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=80

  soulstep-scraper-api:
    name: soulstep-scraper-api tests
    needs: changes
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: soulstep-scraper-api/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r soulstep-scraper-api/requirements-dev.txt
          pip install pip-audit

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r soulstep-scraper-api/requirements.txt --skip-editable || true

      - name: Run pytest
        working-directory: soulstep-scraper-api
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=80

  soulstep-customer-web:
    name: Soulstep Customer Web frontend tests
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        working-directory: apps/soulstep-customer-web
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-web
        run: npm run test -- --coverage

  soulstep-customer-mobile:
    name: Soulstep Customer Mobile frontend tests
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-mobile
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        working-directory: apps/soulstep-customer-mobile
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-mobile
        run: npm test -- --coverage

  soulstep-admin-web:
    name: soulstep-admin-web tests + build
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        working-directory: apps/soulstep-admin-web
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        working-directory: apps/soulstep-admin-web
        run: npm run test:coverage

      - name: Typecheck
        working-directory: apps/soulstep-admin-web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: npm run build
