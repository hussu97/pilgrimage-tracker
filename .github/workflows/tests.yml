name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      scraper: ${{ steps.filter.outputs.scraper }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            catalog:
              - 'soulstep-catalog-api/**'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - 'README.md'
            scraper:
              - 'soulstep-scraper-api/**'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - 'README.md'
            web:
              - 'apps/soulstep-customer-web/**'
              - 'firebase.json'
              - '.firebaserc'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - 'README.md'
            mobile:
              - 'apps/soulstep-customer-mobile/**'
              - '.github/workflows/tests.yml'
              - 'README.md'
            admin:
              - 'apps/soulstep-admin-web/**'
              - 'firebase.json'
              - '.firebaserc'
              - '.github/workflows/tests.yml'
              - '.github/workflows/deploy.yml'
              - 'README.md'
      # Export results so deploy.yml can consume the exact same detection
      - name: Save path filter outputs
        run: |
          printf '{"catalog":"%s","scraper":"%s","web":"%s","admin":"%s"}' \
            "${{ steps.filter.outputs.catalog }}" \
            "${{ steps.filter.outputs.scraper }}" \
            "${{ steps.filter.outputs.web }}" \
            "${{ steps.filter.outputs.admin }}" \
            > path-outputs.json
      - uses: actions/upload-artifact@v4
        with:
          name: path-filter-outputs
          path: path-outputs.json
          retention-days: 1

  soulstep-catalog-api:
    name: soulstep-catalog-api tests
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-catalog-${{ runner.os }}-py3.11-${{ hashFiles('soulstep-catalog-api/requirements-dev.txt') }}
          restore-keys: pip-catalog-${{ runner.os }}-py3.11-

      - name: Install dependencies
        working-directory: soulstep-catalog-api
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements-dev.txt
          .venv/bin/pip install --quiet pip-audit

      - name: Dependency vulnerability scan (pip-audit)
        working-directory: soulstep-catalog-api
        run: .venv/bin/pip-audit -r requirements.txt --skip-editable

      - name: Run pytest
        working-directory: soulstep-catalog-api
        run: >-
          .venv/bin/python -m pytest tests/
          -n auto
          --tb=short
          --cov=app
          --cov-report=term-missing
          --cov-fail-under=80
          --durations=10

  soulstep-scraper-api:
    name: soulstep-scraper-api tests
    needs: changes
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-scraper-${{ runner.os }}-py3.11-${{ hashFiles('soulstep-scraper-api/requirements-dev.txt') }}
          restore-keys: pip-scraper-${{ runner.os }}-py3.11-

      - name: Install dependencies
        working-directory: soulstep-scraper-api
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements-dev.txt
          .venv/bin/pip install --quiet pip-audit

      - name: Dependency vulnerability scan (pip-audit)
        working-directory: soulstep-scraper-api
        run: .venv/bin/pip-audit -r requirements.txt --skip-editable

      - name: Run pytest
        working-directory: soulstep-scraper-api
        run: >-
          .venv/bin/python -m pytest tests/
          -n auto
          --tb=short
          --cov=app
          --cov-report=term-missing
          --cov-fail-under=80
          --durations=10

  soulstep-customer-web:
    name: soulstep-customer-web tests
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-web
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        working-directory: apps/soulstep-customer-web
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-web
        run: npm run test -- --coverage

  soulstep-customer-mobile:
    name: soulstep-customer-mobile tests
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-customer-mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-customer-mobile
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        working-directory: apps/soulstep-customer-mobile
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        working-directory: apps/soulstep-customer-mobile
        run: npm test -- --coverage

  soulstep-admin-web:
    name: soulstep-admin-web tests + build
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/soulstep-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/soulstep-admin-web
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        working-directory: apps/soulstep-admin-web
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        working-directory: apps/soulstep-admin-web
        run: npm run test:coverage

      - name: Typecheck
        working-directory: apps/soulstep-admin-web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/soulstep-admin-web
        run: npm run build
