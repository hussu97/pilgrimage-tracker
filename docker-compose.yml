services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: soulstep
      POSTGRES_USER: soulstep
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulstep"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    restart: unless-stopped

  api:
    build:
      context: ./soulstep-catalog-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://soulstep:${POSTGRES_PASSWORD:-changeme}@db:5432/soulstep
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      JWT_EXPIRE: ${JWT_EXPIRE:-30m}
      REFRESH_EXPIRE: ${REFRESH_EXPIRE:-30d}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@soul-step.org}
      RESET_URL_BASE: ${RESET_URL_BASE:-http://localhost}
      CATALOG_API_KEY: ${CATALOG_API_KEY:-dev-key}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    restart: unless-stopped

  web:
    build:
      context: ./apps/soulstep-customer-web
      dockerfile: Dockerfile

    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped

  # Optional: only starts when you run `docker compose --profile scraper up`
  scraper:
    build:
      context: ./soulstep-scraper-api
      dockerfile: Dockerfile
    environment:
      MAIN_SERVER_URL: http://api:3000
      CATALOG_API_KEY: ${CATALOG_API_KEY:-dev-key}
      # Used by the Knowledge Graph Search enrichment collector
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      SCRAPER_TIMEZONE: ${SCRAPER_TIMEZONE:-UTC}
      # Persist scraper.db to the named volume below so data survives restarts
      SCRAPER_DB_PATH: /data/scraper.db
    volumes:
      - scraper_data:/data
    ports:
      - "${SCRAPER_PORT:-8001}:8001"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.00'
    restart: unless-stopped
    profiles:
      - scraper

volumes:
  postgres_data:
  scraper_data:
